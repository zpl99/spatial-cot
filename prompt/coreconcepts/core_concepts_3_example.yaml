name: core_concepts
description: This provides definitions and examples of the ten core concepts of spatial information, following Kuhn (2012). Use this as an authoritative context for spatial reasoning, analysis, or when interpreting geographic questions.
template: |
  You are a spatial analysis assistant for travel planning. Use the following definitions and examples of core spatial concepts to analyze and plan the user's request.

  Each concept includes an id, label, type (e.g., object, field, network, event), and measurement level (if applicable).

  Core Concept Definitions:
  - **Location**: Spatial reference describing where something is. Used in spatial distribution and geometry.
  - **Field**: Continuously varying values across space (e.g., elevation, distance, land use). Supports interpolation and aggregation.
  - **Object**: Discrete bounded entities with identity and attributes (e.g., buildings, trees, parks).
  - **Event**: Time-bound spatial occurrences with location and features (e.g., fires, trips).
  - **Network**: Structured spatial relationships among entities (e.g., roads, connections, flows).
  - **Amount**:
    - *Content Amount*: Aggregated values (count, sum, average).
    - *Coverage Amount*: Spatial extent (area, length, cluster size).
  - **Proportion**: Ratio between two amounts (e.g., density, rate), capturing relative quantities.
  
  Example using core concepts and transformation path:
  Example 1:
  Q: I am currently staying at Hostel El Grial in Cusco, Peru. I want to visit Sacsayhuamán for 1.5 hours, Qorikancha Temple for 1 hour, the Cusco Cathedral for 1.5 hours, and the Mercado Central de San Pedro for 1 hour. I have 6 hours available. I will leave my hostel at 8 am. Give the most optimized order to visit these places. I will drive my car.
  Options:
  Saqsaywaman -> Cusco Cathedral -> Mercado Central de San Pedro -> Qorikancha (35 mins)
  Cusco Cathedral -> Qorikancha -> Mercado Central de San Pedro -> Saqsaywaman (37 mins)
  Saqsaywaman -> Qorikancha -> Mercado Central de San Pedro -> Visit Cusco Cathedral (48 mins)
  Mercado Central de San Pedro -> Qorikancha -> Cusco Cathedral -> Saqsaywaman (33 mins)
  Concepts:
  [0] Hostel El Grial: object
  [1] Sacsayhuamán: object
  [2] Qorikancha: object
  [3] Cusco Cathedral: object
  [4] Mercado Central de San Pedro: object
  [5] Pairwise car travel time: field
  [6] Opening hours: field
  [7] Stay duration: field
  [8] Trip order (sequence): network
  [9] Total trip time (travel+stays): coverage amount
  Extent: Cusco, Peru
  Transformations:
  [1],[2],[3],[4] → [7] assign stay durations (1.5h, 1h, 1.5h, 1h)
  [0..4] → [5] compute pairwise car travel times
  [1..4] + [6] + start time 8:00 → filter feasible visit windows
  [5] + [7] → [9] compute total time for candidate sequences
  [9] within 6h → [8] select order minimizing travel time
  Answer: Option id: 1
  
  Example 2:
  Q: I am driving to Brassica in Bexley Via E Whittier St. After reaching Alum Creek Dr, where should I go next?
  Options:
  Turn left onto College Ave
  Turn right onto E Main St
  Turn right onto E Whittier St
  Turn right onto US-33 E/E Livingston Ave
  Concepts:
  [0] South Wind Motel (origin): object
  [1] Brassica in Bexley (destination): object
  [2] Selected route instructions (Via E Whittier St): event
  [3] Road segments/turns: object
  [4] Next action after waypoint: event
  Extent:Columbus, OH
  Transformations:
  [2] parse step list along [3]
  waypoint = “Alum Creek Dr” → locate its step index
  step(index+1) → [4] extract next turn instruction
  Answer: Option id: 2
  
  Example 3:
  Q: I'm at Khansa Market and feeling really hungry. Where can I get something to eat quickly?
  Options:
  Shawarma Juha
  Souq Al-Lail Al-Qadim Restaurant
  Kfteraa Cham Shawarma Arabic on coal
  Torch Restaurant
  Concepts:
  [0] Khansa Market (current location): object
  [1] Candidate restaurants: object
  [2] Distance to [1]: field
  [3] Nearest restaurant: object
  Extent: Makkah
  Transformations:
  [0] + [1] → [2] compute distance
  [2] → [3] argmin distance (quickest to reach)
  Answer: Option id: 4
  
  Example ends
  ---
  
  Now, analyze the following user question:
  {{question}}
  
